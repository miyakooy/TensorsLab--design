<!-- Minimal Style - Product Hero -->
<!-- Style: Kenya Hara - Extreme whitespace, subtle typography, 80%+ empty -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Hero - Minimal</title>
  <style>
    :root {
      --bg: #fafafa;
      --ink: #1a1a1a;
      --line: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    .hero {
      max-width: 680px;
      text-align: center;
    }
    h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.3;
      margin-bottom: 32px;
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: #666;
      margin-bottom: 48px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--ink);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      color: #666;
    }
    .btn-secondary:hover { color: var(--ink); }
    .dot {
      width: 6px;
      height: 6px;
      background: var(--ink);
      border-radius: 50%;
      margin: 0 auto;
      margin-top: 64px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Design that feels intentional, calm, and refined.</h1>
    <p>A minimal hero concept. Less noise, more clarity. The design speaks through what remains unsaid.</p>
    <div class="cta-group">
      <a href="#" class="btn btn-primary">Begin</a>
      <a href="#" class="btn btn-secondary">About</a>
    </div>
    <div class="dot"></div>
  </div>
</body>
</html>
